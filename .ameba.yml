# Run `ameba --only Lint/NotNil` for details
Lint/NotNil:
  Description: Identifies usage of `not_nil!` calls
  Excluded:
  - spec/*
  - spec/**/*
  - examples/**/*
  Enabled: true
  Severity: Warning

# Examples and specs use short, domain-specific block parameter names
# (db, ev, r, p, etc.) for readability in demo/test code.
Naming/BlockParameterName:
  Excluded:
  - examples/**/*
  - spec/**/*

# Spec fixtures are standalone programs compiled and run by a spec, not specs
# themselves, so they don't carry the `_spec` suffix.
Lint/SpecFilename:
  Excluded:
  - spec/**/fixtures/**/*
