name: freebsd
version: 15.1.8

authors:
  - Vincent Landgraf <vincent@landgrafx.de>

description: |
  Crystal bindings for FreeBSD security primitives and system libraries: Capsicum
  (capability mode), libcasper (privileged service framework), libbsm (BSM audit),
  privilege-drop helpers, and libpkg (read-only package database access). Lets Crystal
  programs sandbox themselves with kernel-enforced capability limits, delegate
  privileged operations (DNS, pwd, grp, sysctl) to helper processes, write structured
  audit events, safely drop root, and query installed packages and repositories.

crystal: '>= 1.19.1'

license: MIT

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6.0
  # Used only by the sandboxed-SQLite example and spec
  # (examples/capsicum/sqlite.cr, spec/capsicum/integrate/sqlite_spec.cr). The
  # shard itself binds only the libsqlite3 VFS symbols it needs and does not
  # depend on this API — clients add sqlite3 to their own shard.yml.
  sqlite3:
    github: crystal-lang/crystal-sqlite3
    version: ~> 0.23.0
